# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vnsrl.wi
long_name: "Vector widening logical shift right with immediate"
description: |
  Performs widening logical right shift on elements from vector register vs2 by immediate shift amount and stores results in vector register vd, using vector mask vm. The operation fills with zeros and widens the result.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, imm, vm
encoding:
  match: 101100-----------011-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: imm
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
  VectorState state = vector_state();
  VectorLmulType lmul_type = state.lmul_type;

  XReg vlen = VLEN;
  XReg vlmax;
  XReg narrow_vs2_lmul;
  XReg lmul_inc;

  if (lmul_type == VectorLmulType::Multiply) {
    vlmax = (vlen << state.log2_lmul) >> state.log2_sew;
  } else {
    vlmax = (vlen >> state.log2_lmul) >> state.log2_sew;
  }

  for (U32 i = CSR[vstart].VALUE; i < vlmax; i++) {
    U32 start_bit_pos   = i * state.sew;
    U32 end_bit_pos     = start_bit_pos + state.sew - 1;
    U32 n_start_bit_pos = (i * state.sew *2) % vlen;
    U32 n_end_bit_pos   = n_start_bit_pos + (state.sew*2) - 1;
    narrow_vs2_lmul = (i * state.sew *2) / vlen;
    lmul_inc = (i * state.sew) / vlen;
    U32 shift_amount = ((imm)%(state.sew*2));
    if (CSR[vl].VALUE > i){
      v[vd+lmul_inc] = {
        v[vd+lmul_inc][VLEN-1:end_bit_pos + 1],
        mask_elements(vm,(v[vs2+narrow_vs2_lmul])
        [n_end_bit_pos:n_start_bit_pos] >>> shift_amount),
        v[vd+lmul_inc][start_bit_pos-1:0]
      };
    } else {
        v[vd+lmul_inc] = {
        v[vd+lmul_inc][VLEN-1:end_bit_pos + 1],
        tail_elements((v[vd+lmul_inc])[end_bit_pos:start_bit_pos])[end_bit_pos:start_bit_pos],
        v[vd+lmul_inc][start_bit_pos-1:0]
      };
    }
  }
  CSR[vstart].VALUE = 0;